    // 对话助手页面
    const ChatPage = () => {
      const [messages, setMessages] = useState([{ id: '1', type: 'ai', content: '嗨，今天创作上遇到什么难题了？选题、文案还是数据，我们一起看看？', timestamp: '刚刚' }]);
      const [inputMessage, setInputMessage] = useState('');
      const [outputContent, setOutputContent] = useState(null);
      const [panelCollapsed, setPanelCollapsed] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      // Agent API 配置 (V2 同步接口)
      const COZE_CONFIG = {
        botId: import.meta.env.VITE_COZE_BOT_ID || '7633041099640569898',
        apiKey: import.meta.env.VITE_COZE_API_KEY || 'pat_O3n7XLN2l3gXPqEfJzLoLn2nTrtvLqoiyJs2jAm8CF4fjFXHAyyRLeJ4VnFBiEz9',
        apiUrl: 'https://api.coze.cn/open_api/v2/chat'
      };

      // 格式化消息内容：处理插件代码 + Markdown
      const formatMessage = (text) => {
        if (!text) return '';
        
        // 处理 TODO 插件代码
        text = text.replace(/\[TODO\]([\s\S]*?)\[\/TODO\]/g, (match, jsonStr) => {
          return '<div class="my-3 p-3 bg-blue-50 border border-blue-100 rounded-xl flex items-center gap-2 text-blue-700 text-sm font-medium">📋 系统已自动为您创建待办事项</div>';
        });
        
        // 处理 SCHEDULE 插件代码
        text = text.replace(/\[SCHEDULE\]([\s\S]*?)\[\/SCHEDULE\]/g, (match, jsonStr) => {
          return '<div class="my-3 p-3 bg-green-50 border border-green-100 rounded-xl flex items-center gap-2 text-green-700 text-sm font-medium">📅 系统已自动为您创建日程安排</div>';
        });
        
        // 使用 marked.parse 将 Markdown 转换为 HTML
        return marked.parse(text);
      };

      // 统一的 Coze API 调用函数
      const callCozeApi = async (message) => {
        console.log('callCozeApi 被调用，消息:', message);
        setIsLoading(true);
        try {
          const response = await fetch(COZE_CONFIG.apiUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${COZE_CONFIG.apiKey}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              bot_id: COZE_CONFIG.botId,
              user: 'test_user',
              query: message,
              stream: false
            })
          });

          console.log('API响应状态:', response.status);
          const result = await response.json();
          console.log('API响应数据:', result);

          // 检查 HTTP 状态码
          if (!response.ok) {
            const errorMsg = `HTTP错误 ${response.status}: ${result.msg || response.statusText}`;
            console.error('HTTP错误:', errorMsg);
            setMessages(prev => [...prev, {
              id: (Date.now() + 1).toString(),
              type: 'ai',
              content: `❌ 请求失败：${errorMsg}`,
              timestamp: '刚刚'
            }]);
            return;
          }

          // 检查业务错误码 (Coze V2)
          if (result.code && result.code !== 0) {
            const errorMsg = result.msg || `业务错误码: ${result.code}`;
            console.error('业务错误:', errorMsg);
            setMessages(prev => [...prev, {
              id: (Date.now() + 1).toString(),
              type: 'ai',
              content: `❌ 接口返回错误：${errorMsg}`,
              timestamp: '刚刚'
            }]);
            return;
          }

          // 成功：从 messages 数组中提取 AI 回复 (Coze V2 格式)
          if (result.messages && Array.isArray(result.messages)) {
            // 寻找 role === 'assistant' 且 type === 'answer' 的消息
            const aiMessage = result.messages.find(msg => 
              msg.role === 'assistant' && msg.type === 'answer'
            );
            
            if (aiMessage && aiMessage.content) {
              console.log('找到AI回复:', aiMessage.content);
              setMessages(prev => [...prev, {
                id: (Date.now() + 1).toString(),
                type: 'ai',
                content: aiMessage.content,
                timestamp: '刚刚'
              }]);
            } else {
              // 没找到符合条件的消息
              console.warn('未找到 assistant/answer 消息:', result.messages);
              // 尝试提取其他 assistant 消息
              const fallbackMessage = result.messages.find(msg => msg.role === 'assistant');
              if (fallbackMessage && fallbackMessage.content) {
                setMessages(prev => [...prev, {
                  id: (Date.now() + 1).toString(),
                  type: 'ai',
                  content: fallbackMessage.content,
                  timestamp: '刚刚'
                }]);
              } else {
                setMessages(prev => [...prev, {
                  id: (Date.now() + 1).toString(),
                  type: 'ai',
                  content: `⚠️ 未找到AI回复内容，请检查接口返回格式。`,
                  timestamp: '刚刚'
                }]);
              }
            }
          } else {
            // 返回数据格式不符合预期
            console.warn('返回数据缺少 messages 数组:', result);
            setMessages(prev => [...prev, {
              id: (Date.now() + 1).toString(),
              type: 'ai',
              content: `⚠️ 接口返回了意外的数据格式：${JSON.stringify(result).substring(0, 150)}...`,
              timestamp: '刚刚'
            }]);
          }

        } catch (error) {
          // 网络错误或 JSON 解析错误
          console.error('API调用异常:', error);
          const errorMessage = error.message || '网络连接失败，请检查网络后重试';
          alert('网络请求失败：' + errorMessage);
          setMessages(prev => [...prev, {
            id: (Date.now() + 1).toString(),
            type: 'ai',
            content: `❌ 网络错误：${errorMessage}。请稍后重试或检查网络连接。`,
            timestamp: '刚刚'
          }]);
        } finally {
          setIsLoading(false);
        }
      };

      // 发送用户消息
      const sendMessage = async () => {
        console.log('按钮被点击了，准备发送消息:', inputMessage);
        if (!inputMessage.trim()) {
          console.log('输入为空，直接返回');
          return;
        }

        const messageToSend = inputMessage;
        const userMsg = { id: Date.now().toString(), type: 'user', content: messageToSend, timestamp: '刚刚' };
        console.log('添加用户消息:', userMsg);
        setMessages(prev => [...prev, userMsg]);
        setInputMessage('');

        // 调用统一 API 函数
        await callCozeApi(messageToSend);
      };

      // 快捷操作处理
      const handleQuickAction = async (action) => {
        const actionMap = {
          diagnose: '帮我诊断账号定位问题',
          topic: '根据我的定位推荐爆款选题',
          generate: '帮我生成完整的小红书笔记',
          optimize: '帮我优化笔记并进行风险检测',
          review: '帮我分析数据并给出反馈建议'
        };

        const prompt = actionMap[action];
        if (!prompt) return;

        console.log('快捷操作:', action, prompt);
        const userMsg = { id: Date.now().toString(), type: 'user', content: prompt, timestamp: '刚刚' };
        setMessages(prev => [...prev, userMsg]);

        // 调用统一 API 函数
        await callCozeApi(prompt);
      };

      return (
        <div className="flex h-screen">

                      </div>
                    </div>
                  );
                }
                return (
                  <div key={msg.id} className={`flex gap-4 ${msg.type === 'user' ? 'flex-row-reverse' : ''}`}>
                    <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${msg.type === 'user' ? 'bg-gradient-to-br from-primary to-accent-purple text-white' : 'bg-gradient-to-br from-gray-100 to-gray-200 text-gray-600'}`}>
                      {msg.type === 'user' ? <UserIcon className="text-base" /> : <RobotIcon className="text-base" />}
                    </div>
                    <div className={`max-w-[70%] px-5 py-4 ${msg.type === 'user' ? 'bg-gradient-to-r from-primary to-accent-purple text-white rounded-2xl rounded-tr-md shadow-button' : 'bg-gray-50 text-text-primary rounded-2xl rounded-tl-md'}`}>
                      {msg.type === 'user' ? (
                        <p className="whitespace-pre-wrap text-sm leading-relaxed">{msg.content}</p>
                      ) : (
                        <div className="prose prose-sm max-w-none" dangerouslySetInnerHTML={{ __html: formatMessage(msg.content) }} />
                      )}
                      <span className={`text-xs mt-2 block ${msg.type === 'user' ? 'text-white/70' : 'text-gray-400'}`}>{msg.timestamp}</span>
                    </div>
                  </div>
                );
              })}
              {isLoading && (
                <div className="flex gap-4">
                  <div className="w-11 h-11 rounded-xl flex items-center justify-center text-lg flex-shrink-0 bg-gradient-to-br from-gray-100 to-gray-200 text-gray-600">
                    <RobotIcon className="text-base" />
                  </div>

        const newFollowers = Math.max(1000, Math.min(baseFollowers, 50000));
        const newFollowersChange = newFollowers - prevStats.followers; // 增量基于总量计算

        const newProfileViews = newFollowersChange * (Math.random() * 5 + 5) + Math.round(prevStats.profileViews * 0.8);
        const newProfileViewsChange = newProfileViews - prevStats.profileViews;

        return {
          followers: newFollowers,
          followersChange: newFollowersChange,
          engagementRate: parseFloat(newEngagementRate.toFixed(1)),
          engagementChange: parseFloat(newEngagementChange.toFixed(1)),

      const [activeCard, setActiveCard] = useState(null);

      const cards = [
        { key: 'platform', icon: ScrollIcon, title: '平台规则速查', desc: '了解各大平台社区规范', gradient: 'from-primary-light to-accent-purple/20' },
        { key: 'benchmark', icon: ChartBarIcon, title: '数据基准参考', desc: '各领域KOL数据表现参考', gradient: 'from-accent-cyan/20 to-primary-light' },
        { key: 'case', icon: MagnifyingGlassIcon, title: '爆款案例分析', desc: '拆解成功案例的共性', gradient: 'from-accent-pink/20 to-accent-purple/20' },
        { key: 'methodology', icon: BooksIcon, title: '运营方法论', desc: '系统化的运营策略', gradient: 'from-accent-green/20 to-accent-cyan/20' }
      ];

      const currentKnowledge = activeCard ? mockData.knowledge.filter(k => k.category === activeCard) : [];

      return (
        <div className="px-6 py-8 min-h-screen bg-bg">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-text-primary">知识库</h1>
            <p className="text-sm text-gray-500 mt-1">学习运营知识，提升创作能力</p>
          </div>

          <div className="grid grid-cols-4 gap-5 mb-8">
            {cards.map(card => {
              const IconComp = card.icon;
              return (
                <div key={card.key} onClick={() => setActiveCard(activeCard === card.key ? null : card.key)} className={`p-6 rounded-2xl cursor-pointer transition-all duration-300 ${activeCard === card.key ? 'bg-gradient-to-br ' + card.gradient + ' ring-2 ring-primary shadow-hover' : 'bg-white shadow-card hover:shadow-hover'}`}>
                  <IconComp className="text-2xl mb-4 block text-primary" />
                  <h3 className="font-semibold text-text-primary">{card.title}</h3>
                  <p className="text-sm text-gray-500 mt-2">{card.desc}</p>
                </div>
              );
            })}
          </div>

          {activeCard && (
            <div className="space-y-4">
              {currentKnowledge.map(item => (
                <div key={item.id} className="bg-white rounded-2xl p-5 shadow-card hover:shadow-hover transition-all duration-300">
                  <h3 className="font-semibold text-text-primary">{item.title}</h3>
                  <p className="text-sm text-gray-500 mt-2">{item.summary}</p>
                  <button className="mt-4 px-4 py-2 bg-primary-light text-primary rounded-lg text-sm font-medium hover:bg-primary-light/50">查看详情</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // 设置页面
    const SettingsPage = () => {
      const [activeTab, setActiveTab] = useState('account');

      return (
        <div className="px-6 py-8 min-h-screen bg-bg">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-text-primary">设置</h1>
            <p className="text-sm text-gray-500 mt-1">管理您的账户和应用设置</p>
          </div>

          <div className="flex gap-6">
            <div className="w-56">
              <nav className="space-y-1">
                {[{ key: 'account', label: '账户信息' }, { key: 'notification', label: '通知设置' }, { key: 'appearance', label: '外观设置' }, { key: 'about', label: '关于我们' }].map(tab => (
                  <button key={tab.key} onClick={() => setActiveTab(tab.key)} className={`w-full px-4 py-3 text-left rounded-xl transition-all ${activeTab === tab.key ? 'bg-gradient-to-r from-primary to-accent-purple text-white' : 'hover:bg-gray-50 text-gray-700'}`}>
                    {tab.label}
                  </button>
                ))}
              </nav>
            </div>

            <div className="flex-1 bg-white rounded-2xl p-8 shadow-card">
              {activeTab === 'account' && (
                <div className="space-y-6">
                  <div className="flex items-center gap-6">
                    <div className="w-20 h-20 bg-gradient-to-br from-primary to-accent-purple rounded-2xl flex items-center justify-center text-3xl text-white">Z</div>
                    <div>
                      <h3 className="text-lg font-semibold text-text-primary">涨粉社用户</h3>
                      <p className="text-sm text-gray-500">zhangfen@example.com</p>
                    </div>
                  </div>
                  <div className="h-px bg-gray-100"></div>
                  <div className="grid grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">昵称</label>
                      <input type="text" defaultValue="涨粉社用户" className="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:border-primary" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                      <input type="email" defaultValue="zhangfen@example.com" className="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:border-primary" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">简介</label>
                    <textarea rows="3" defaultValue="专注于社交媒体运营，分享涨粉技巧和内容创作经验" className="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm focus:outline-none focus:border-primary resize-none" />
                  </div>
                  <button className="px-6 py-3 bg-gradient-to-r from-primary to-accent-purple text-white rounded-xl font-medium hover:shadow-button transition-all">保存修改</button>
                </div>
              )}

              {activeTab === 'notification' && (
                <div className="space-y-4">
                  {[{ label: '消息通知', desc: '接收新消息和回复通知', enabled: true }, { label: '周报推送', desc: '每周收到数据复盘报告', enabled: true }, { label: '热点提醒', desc: '发现热门话题时通知', enabled: false }, { label: '系统更新', desc: '接收应用更新通知', enabled: true }].map((item, i) => (
                    <div key={i} className="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                      <div>
                        <h4 className="font-medium text-text-primary">{item.label}</h4>
                        <p className="text-sm text-gray-500 mt-1">{item.desc}</p>
                      </div>
                      <button className={`w-12 h-7 rounded-full transition-all ${item.enabled ? 'bg-primary' : 'bg-gray-300'}`}>
                        <div className={`w-5 h-5 bg-white rounded-full shadow-sm transform transition-transform ${item.enabled ? 'translate-x-6' : 'translate-x-1'}`}></div>
                      </button>
                    </div>
                  ))}
                </div>
              )}

              {activeTab === 'appearance' && (
                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-3">主题模式</label>
                    <div className="flex gap-3">
                      <button className="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium flex items-center gap-2">
                        <SunIcon className="text-base" /> 浅色
                      </button>
                      <button className="px-4 py-2.5 bg-gradient-to-r from-primary to-accent-purple text-white rounded-lg text-sm font-medium flex items-center gap-2">
                        <MoonIcon className="text-base" /> 深色
                      </button>
                      <button className="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium flex items-center gap-2">
                        <SettingsIcon className="text-base" /> 跟随系统
                      </button>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-3">字体大小</label>
                    <div className="flex gap-3">
                      {['小号', '默认', '大号', '特大'].map((size, i) => (
                        <button key={size} className={`px-4 py-2.5 rounded-lg text-sm font-medium ${i === 1 ? 'bg-gradient-to-r from-primary to-accent-purple text-white' : 'bg-gray-100 text-gray-700'}`}>{size}</button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'about' && (
                <div className="space-y-6">
                  <div className="p-6 bg-gradient-to-r from-primary-light/50 to-accent-purple/10 rounded-xl">
                    <h3 className="text-lg font-semibold text-text-primary mb-2">涨粉社</h3>
                    <p className="text-sm text-gray-600">KOC智能运营助手</p>
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <p className="text-2xl font-bold text-text-primary">v1.0.0</p>
                      <p className="text-xs text-gray-500">版本号</p>
                    </div>
                    <div>
                      <p className="text-2xl font-bold text-text-primary">2024</p>
                      <p className="text-xs text-gray-500">发布年份</p>
                    </div>
                    <div>
                      <p className="text-2xl font-bold text-text-primary">AI</p>
                      <p className="text-xs text-gray-500">驱动技术</p>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <button className="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200">服务条款</button>
                    <button className="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200">隐私政策</button>
                    <button className="px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200">联系我们</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // 主应用组件
    const App = () => {
      const [currentPage, setCurrentPage] = useState('chat');

      const renderPage = () => {
        switch (currentPage) {
          case 'chat': return <ChatPage />;
          case 'dashboard': return <DashboardPage />;
          case 'planning': return <PlanningPage />;
          case 'calendar': return <CalendarPage />;
          case 'plans': return <PlansPage />;
          case 'knowledge': return <KnowledgePage />;
          case 'settings': return <SettingsPage />;
          default: return <ChatPage />;
        }
      };

      return (
        <div className="flex min-h-screen bg-bg">
          <Sidebar currentPage={currentPage} onNavigate={setCurrentPage} />
          <main className="flex-1 ml-60 min-h-screen">
            <div key={currentPage} className="animate-fadeIn mx-auto max-w-[1200px]">
              {renderPage()}
            </div>
          </main>
        </div>
      );
    };

    // 挂载React应用
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
